
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva de Salas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --h500:#496be3; --h600:#3851d8;
      --g600:#28c040; --r600:#d42e2e;
      --n50:#f5f6f8; --n100:#eeeef1; --n200:#dfe0e6; --n300:#cbcdd6;
      --tx:#303036; --tx2:#636271; --tx3:#aaaaba;
      --bg:#f5f6f8; --surf:#ffffff; --bd:#dfe0e6; --bdl:#eeeef1;
      --sh4:-1px 4px 8px 0px rgba(233,233,244,1);
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
    }
    html, body { height: 100%; width: 100%; font-family: var(--font); font-size: 14px; color: var(--tx); background: var(--bg); line-height: 1.4; }
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* HEADER */
    #hdr { background: var(--surf); border-bottom: 1px solid var(--bd); padding: 12px 20px; display: flex; align-items: center; gap: 15px; box-shadow: var(--sh4); }
    .header-left { display: flex; align-items: center; gap: 10px; }
    #page-title { font-size: 16px; font-weight: 700; color: var(--tx); }
    .room-selector { display: flex; align-items: center; gap: 8px; }
    .room-selector label { font-weight: 600; font-size: 12px; color: var(--tx2); }
    .room-selector select { border: 1px solid var(--bd); border-radius: 6px; padding: 6px 10px; font-family: var(--font); font-size: 12px; color: var(--tx); cursor: pointer; }

    .header-center { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .nav-btn { background: none; border: none; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--tx2); transition: background .15s; font-weight: 600; }
    .nav-btn:hover { background: var(--n100); color: var(--tx); }
    .date-label { font-size: 13px; font-weight: 600; color: var(--tx); min-width: 180px; text-align: center; }

    .view-buttons { display: flex; gap: 3px; background: var(--n100); border-radius: 6px; padding: 3px; }
    .view-btn { background: none; border: none; border-radius: 4px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--tx2); cursor: pointer; transition: all .15s; }
    .view-btn.active { background: var(--surf); color: var(--h600); box-shadow: var(--sh4); }

    /* MAIN */
    #main { flex: 1; overflow: hidden; display: flex; }

    /* CALENDAR CONTAINER */
    .calendar-container { flex: 1; overflow-y: auto; overflow-x: hidden; }

    /* WEEK VIEW */
    .week-view { display: grid; grid-template-columns: 70px repeat(7, 1fr); gap: 1px; background: var(--bd); padding: 0; height: 100%; }
    .week-header { display: contents; }
    .time-column { display: flex; flex-direction: column; }
    .time-slot { height: 60px; border-bottom: 1px solid var(--bd); background: var(--surf); padding: 4px; text-align: right; font-size: 11px; color: var(--tx3); }
    .time-label { font-weight: 600; padding: 4px 8px; }

    .day-column { background: var(--surf); position: relative; border-right: 1px solid var(--bd); }
    .day-header { background: var(--n50); padding: 8px; text-align: center; font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--bd); min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
    .day-header .day-name { font-size: 11px; color: var(--tx2); }
    .day-header .day-number { font-size: 14px; color: var(--tx); }

    .event-block { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 4px; font-size: 11px; overflow: hidden; cursor: pointer; transition: all .15s; color: white; }
    .event-block:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .event-block.available { background: var(--h500); }
    .event-block.reserved { background: var(--r600); opacity: 0.8; }
    .event-block.my-reservation { background: var(--h600); }
    .event-name { font-weight: 600; }
    .event-time { font-size: 10px; opacity: 0.9; }
    .event-requester { font-size: 9px; opacity: 0.8; }

    /* MODAL */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-box { background: var(--surf); border-radius: 12px; padding: 20px; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: var(--tx); }
    .modal-field { margin-bottom: 12px; }
    .modal-label { font-size: 12px; font-weight: 600; color: var(--tx2); }
    .modal-value { font-size: 13px; color: var(--tx); margin-top: 4px; }
    .modal-close { background: var(--n100); color: var(--tx); border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; }
    .modal-close:hover { background: var(--n200); }

    /* BOOKING PANEL (admin only) */
    .booking-panel { width: 350px; background: var(--surf); border-left: 1px solid var(--bd); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .booking-panel h3 { font-size: 13px; font-weight: 700; color: var(--tx); }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--tx2); }
    .form-input, .form-select, .form-textarea { border: 1px solid var(--bd); border-radius: 6px; padding: 6px 10px; font-family: var(--font); font-size: 12px; color: var(--tx); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--h500); box-shadow: 0 0 0 2px rgba(73, 107, 227, 0.1); }
    .form-textarea { resize: vertical; min-height: 50px; }

    .form-buttons { display: flex; gap: 8px; }
    .btn { border: none; border-radius: 6px; padding: 6px 12px; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--h500); color: white; flex: 1; }
    .btn-primary:hover { background: var(--h600); }
    .btn-secondary { background: var(--n100); color: var(--tx); flex: 1; border: 1px solid var(--bd); }
    .btn-secondary:hover { background: var(--n200); }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* USER VIEW (no panel) */
    .user-view .booking-panel { display: none !important; }
    .user-view .calendar-container { flex: 1; }

    @media(max-width:768px) {
      .week-view { grid-template-columns: 50px repeat(7, 1fr); }
      .booking-panel { width: 280px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div class="header-left">
      <h1 id="page-title">Reserva de Salas</h1>
      <div id="room-selector-wrapper" class="room-selector hidden">
        <label for="room-select">Sala:</label>
        <select id="room-select" onchange="changeRoom()">
          <option value="room-a">Sala 1 - 3er Piso</option>
          <option value="room-b">Sala 2 - 3er Piso</option>
          <option value="room-c">Sala 4to Piso</option>
          <option value="room-d">Sala de reuniones - Grand Bourg</option>
          <option value="room-e">Sala de capacitaciones - Grand Bourg</option>
        </select>
      </div>
    </div>

    <div class="header-center">
      <button class="nav-btn" onclick="navPrev()">◀</button>
      <button class="nav-btn" onclick="goToday()">Hoy</button>
      <button class="nav-btn" onclick="navNext()">▶</button>
      <span class="date-label" id="date-label"></span>

      <div class="view-buttons">
        <button class="view-btn active" onclick="setView('month')">Mes</button>
        <button class="view-btn" onclick="setView('week')">Semana</button>
        <button class="view-btn" onclick="setView('day')">Día</button>
      </div>
    </div>
  </header>

  <div id="main">
    <div class="calendar-container">
      <div id="calendar-view"></div>
    </div>

    <!-- BOOKING PANEL (admin only) -->
    <div class="booking-panel">
      <h3>Nueva Reserva</h3>
      <form id="booking-form" onsubmit="submitBooking(event)">
        <div class="form-group">
          <label class="form-label">Fecha *</label>
          <input type="date" id="booking-date" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Hora Inicio *</label>
          <input type="time" id="booking-start" class="form-input" required min="08:00" max="17:00" value="08:00" onchange="updateEndTimes()">
        </div>

        <div class="form-group">
          <label class="form-label">Hora Fin *</label>
          <input type="time" id="booking-end" class="form-input" required min="08:30" max="18:00" value="09:00">
        </div>

        <div class="form-group">
          <label class="form-label">Recurrencia</label>
          <select id="booking-recurrence" class="form-input" onchange="toggleRecurrenceFields()">
            <option value="none">Una sola vez</option>
            <option value="weekly">Cada semana (mismo día)</option>
            <option value="biweekly">Cada 15 días</option>
            <option value="monthly">Cada mes (mismo día)</option>
          </select>
        </div>

        <div id="recurrence-fields" style="display: none;">
          <div class="form-group">
            <label class="form-label">Repetir hasta</label>
            <select id="booking-recurrence-end" class="form-input" onchange="toggleRecurrenceDateField()">
              <option value="forever">Siempre</option>
              <option value="date">Fecha específica</option>
            </select>
          </div>

          <div id="recurrence-end-date-field" style="display: none;" class="form-group">
            <label class="form-label">Fecha final</label>
            <input type="date" id="booking-recurrence-end-date" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nombre del evento *</label>
          <input type="text" id="booking-name" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Quién reserva</label>
          <input type="text" id="booking-requester" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Detalles</label>
          <textarea id="booking-details" class="form-textarea" placeholder="Equipamiento, disposición, etc."></textarea>
        </div>

        <div class="form-buttons">
          <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Limpiar</button>
          <button type="submit" class="btn btn-primary">Reservar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL para ver detalles de reserva -->
  <div class="modal" id="event-modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-event-name"></div>
      <div class="modal-field">
        <div class="modal-label">Horario</div>
        <div class="modal-value" id="modal-event-time"></div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Fecha</div>
        <div class="modal-value" id="modal-event-date"></div>
      </div>
      <div class="modal-field">
        <div class="modal-label">Quién reserva</div>
        <div class="modal-value" id="modal-event-requester"></div>
      </div>
      <div class="modal-field" id="modal-details-group" style="display:none;">
        <div class="modal-label">Detalles</div>
        <div class="modal-value" id="modal-event-details"></div>
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end;">
        <button class="modal-close" onclick="closeEventModal()" style="background: var(--n100); color: var(--tx); border: 1px solid var(--bd); flex: 1;">Cerrar</button>
        <button id="btn-edit-event" class="modal-close" onclick="editEventReservation()" style="background: var(--h500); color: white; flex: 1; display: none;">Editar</button>
        <button id="btn-delete-event" class="modal-close" onclick="deleteEventReservation()" style="background: var(--r600); color: white; flex: 1; display: none;">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- MODAL para ver detalles de reserva -->
  <div id="modal-details" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: var(--surf); border-radius: 12px; padding: 20px; max-width: 400px; width: 90%;">
      <h2 id="modal-title" style="margin-bottom: 15px; font-size: 16px; font-weight: 700;"></h2>
      <div id="modal-content" style="margin-bottom: 15px; font-size: 13px; line-height: 1.6;"></div>
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button onclick="closeModal()" class="btn btn-secondary">Cerrar</button>
        <button onclick="deleteReservationFromModal()" class="btn" style="background: var(--r600); color: white;">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- MODAL para confirmar eliminación de recurrencias -->
  <div id="modal-delete-recurrence" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: var(--surf); border-radius: 12px; padding: 20px; max-width: 450px; width: 90%;">
      <h2 style="margin-bottom: 15px; font-size: 16px; font-weight: 700; color: var(--tx);">¿Cómo deseas eliminar?</h2>
      <p style="margin-bottom: 20px; font-size: 13px; color: var(--tx2); line-height: 1.6;">Esta es una reserva recurrente. ¿Qué deseas eliminar?</p>
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button onclick="closeDeleteRecurrenceModal()" class="btn btn-secondary">Cancelar</button>
        <button onclick="deleteRecurrenceInstance()" class="btn" style="background: var(--n200); color: var(--tx);">Solo esta fecha</button>
        <button onclick="deleteRecurrenceSeries()" class="btn" style="background: var(--r600); color: white;">Toda la serie</button>
      </div>
    </div>
  </div>

<script>
// CONFIG
const ROOMS = [
  { id: 'room-a', name: 'Sala 1 - 3er Piso', color: '#496be3' },
  { id: 'room-b', name: 'Sala 2 - 3er Piso', color: '#28c040' },
  { id: 'room-c', name: 'Sala 4to Piso', color: '#d42e2e' },
  { id: 'room-d', name: 'Sala de reuniones - Grand Bourg', color: '#f5a623' },
  { id: 'room-e', name: 'Sala de capacitaciones - Grand Bourg', color: '#9b59b6' },
];

const STORAGE_KEY = 'rooms_reservations';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// SUPABASE CONFIG
const SUPABASE_URL = 'https://qiwmuqeunuumtdzqryui.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpd211cWV1bnV1bXRkenFyeXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzIxOTksImV4cCI6MjA5NTkwODE5OX0.b064_zxooRgqc_jllML8VDfeun22tYRDr0fJZn4ZpNU';
window.supabaseClient = null;

let state = {
  mode: 'view',
  currentRoom: 'room-a',
  currentDate: new Date(),
  view: 'month',
  selectedReservation: null,
  currentEventInModal: null,
  editingReservationId: null,
};

// HELPERS
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    mode: params.get('mode') || 'view',
    sala: params.get('sala') || 'A',
  };
}

function getRoomId(salaLetter) {
  const map = { 'A': 'room-a', 'B': 'room-b', 'C': 'room-c', 'D': 'room-d', 'E': 'room-e' };
  return map[salaLetter] || 'room-a';
}

function getRoomData(roomId) {
  return ROOMS.find(r => r.id === roomId);
}

function dateToString(d) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function generateId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// STORAGE - Supabase
let cachedReservations = {};

async function getReservations(roomId) {
  try {
    if (!cachedReservations[roomId]) {
      const { data, error } = await window.supabaseClient
        .from('reservations')
        .select('*')
        .eq('room_id', roomId);

      if (error) {
        console.error('Error fetching reservations:', error);
        return [];
      }

      cachedReservations[roomId] = data || [];
    }
    return cachedReservations[roomId];
  } catch (e) {
    console.error('Storage error:', e);
    return [];
  }
}

async function setReservations(roomId, reservations) {
  try {
    // Actualizar en caché local
    cachedReservations[roomId] = reservations;
  } catch (e) {
    console.error('Storage error:', e);
  }
}

async function expandRecurringEvents(roomId, dateRange) {
  const baseReservations = await getReservations(roomId);
  const exceptions = await getExceptions();
  const expanded = [];

  for (const r of baseReservations) {
    if (!r.recurrence_type || r.recurrence_type === '') {
      // Evento único
      expanded.push(r);
    } else {
      // Expandir evento recurrente
      const instances = generateRecurringInstances(r, dateRange, exceptions);
      expanded.push(...instances);
    }
  }

  return expanded;
}

let cachedExceptions = { loaded: false, data: [] };

async function getExceptions() {
  try {
    if (!cachedExceptions.loaded) {
      const { data, error } = await window.supabaseClient
        .from('reservation_exceptions')
        .select('*');

      if (error) {
        console.error('Error fetching exceptions:', error);
        cachedExceptions = { loaded: false, data: [] };
        return [];
      }

      cachedExceptions = { loaded: true, data: data || [] };
    }
    return cachedExceptions.data || [];
  } catch (e) {
    console.error('Error:', e);
    cachedExceptions = { loaded: false, data: [] };
    return [];
  }
}

async function addDeleteException(parentId, date) {
  try {
    const { error } = await window.supabaseClient
      .from('reservation_exceptions')
      .insert([{
        parent_id: parentId,
        exception_date: date,
        exception_type: 'deleted'
      }]);

    if (error) {
      console.error('Error adding exception:', error);
      return false;
    }

    cachedExceptions.loaded = false;
    return true;
  } catch (e) {
    console.error('Error:', e);
    return false;
  }
}

function generateRecurringInstances(baseEvent, dateRange, exceptions = []) {
  const instances = [];
  const { start, end } = dateRange;

  // Helper para parsear fechas sin problemas de zona horaria
  function parseDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function dateToString(d) {
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  if (baseEvent.recurrence_type === 'weekly') {
    const targetDow = baseEvent.recurrence_day_of_week;
    const baseDate = parseDate(baseEvent.date);
    const endDate = baseEvent.recurrence_end_date && baseEvent.recurrence_end_date !== ''
      ? parseDate(baseEvent.recurrence_end_date)
      : new Date('2099-12-31');

    let current = new Date(baseDate);

    // Ajustar al primer día que coincida con el día de la semana
    while (current.getDay() !== targetDow) {
      current.setDate(current.getDate() + 1);
    }

    // Generar instancias mientras esté en rango y antes de fecha final
    while (current <= end && current <= endDate) {
      if (current >= start) {
        const dateStr = dateToString(current);
        const isException = exceptions.some(e => e.parent_id === baseEvent.id && e.exception_date === dateStr);

        if (!isException) {
          instances.push({
            ...baseEvent,
            id: `${baseEvent.id}-${dateStr}`,
            date: dateStr,
            recurrence_parent_id: baseEvent.id
          });
        }
      }
      current.setDate(current.getDate() + 7);
    }
  }

  if (baseEvent.recurrence_type === 'biweekly') {
    const baseDate = parseDate(baseEvent.date);
    const endDate = baseEvent.recurrence_end_date && baseEvent.recurrence_end_date !== ''
      ? parseDate(baseEvent.recurrence_end_date)
      : new Date('2099-12-31');

    let current = new Date(baseDate);

    while (current <= end && current <= endDate) {
      if (current >= start) {
        const dateStr = dateToString(current);
        const isException = exceptions.some(e => e.parent_id === baseEvent.id && e.exception_date === dateStr);
        if (!isException) {
          instances.push({
            ...baseEvent,
            id: `${baseEvent.id}-${dateStr}`,
            date: dateStr,
            recurrence_parent_id: baseEvent.id
          });
        }
      }
      current.setDate(current.getDate() + 14);
    }
  }

  if (baseEvent.recurrence_type === 'monthly') {
    const targetDom = baseEvent.recurrence_day_of_month;
    const baseDate = parseDate(baseEvent.date);
    const endDate = baseEvent.recurrence_end_date && baseEvent.recurrence_end_date !== ''
      ? parseDate(baseEvent.recurrence_end_date)
      : new Date('2099-12-31');

    let current = new Date(baseDate.getFullYear(), baseDate.getMonth(), targetDom);

    while (current <= end && current <= endDate) {
      const dateStr = dateToString(current);
      const isException = exceptions.some(e => e.parent_id === baseEvent.id && e.exception_date === dateStr);

      if (current >= start && !isException) {
        instances.push({
          ...baseEvent,
          id: `${baseEvent.id}-${dateStr}`,
          date: dateStr,
          recurrence_parent_id: baseEvent.id
        });
      }
      current.setMonth(current.getMonth() + 1);
    }
  }

  return instances;
}

async function addReservation(reservation) {
  try {
    const insertData = {
      id: reservation.id,
      room_id: reservation.roomId || state.currentRoom,
      date: reservation.date,
      start_time: reservation.startTime,
      end_time: reservation.endTime,
      name: reservation.name,
      requester: reservation.requester,
      notes: reservation.notes || ''
    };

    // Agregar campos de recurrencia solo si tienen valores
    if (reservation.recurrenceType) {
      insertData.recurrence_type = reservation.recurrenceType;
    }
    if (reservation.recurrenceEndDate) {
      insertData.recurrence_end_date = reservation.recurrenceEndDate;
    }
    if (reservation.dayOfWeek !== null && reservation.dayOfWeek !== undefined) {
      insertData.recurrence_day_of_week = reservation.dayOfWeek;
    }
    if (reservation.dayOfMonth !== null && reservation.dayOfMonth !== undefined) {
      insertData.recurrence_day_of_month = reservation.dayOfMonth;
    }

    const { data, error } = await window.supabaseClient
      .from('reservations')
      .insert([insertData]);

    if (error) {
      console.error('Error adding reservation:', error);
      return false;
    }

    // Actualizar caché
    const roomId = reservation.roomId || state.currentRoom;
    cachedReservations[roomId] = null;
    return true;
  } catch (e) {
    console.error('Error:', e);
    return false;
  }
}

async function deleteReservation(reservationId, roomId) {
  try {
    const { error } = await window.supabaseClient
      .from('reservations')
      .delete()
      .eq('id', reservationId);

    if (error) {
      console.error('Error deleting reservation:', error);
      return false;
    }

    // Actualizar caché
    cachedReservations[roomId] = null;
    return true;
  } catch (e) {
    console.error('Error:', e);
    return false;
  }
}

async function hasConflict(roomId, dateStr, startTime, endTime) {
  const reservations = await getReservations(roomId);
  const startHour = parseInt(startTime.split(':')[0]);
  const endHour = parseInt(endTime.split(':')[0]);

  return reservations.some(r => {
    if (r.date !== dateStr) return false;
    const rStart = parseInt(r.start_time.split(':')[0]);
    const rEnd = parseInt(r.end_time.split(':')[0]);
    return !(endHour <= rStart || startHour >= rEnd);
  });
}

// RENDER WEEK VIEW
async function renderWeek() {
  const start = new Date(state.currentDate);
  start.setDate(start.getDate() - start.getDay());

  let html = '<div class="week-view" style="height: auto; min-height: 100%;">';

  // Time column header
  html += '<div class="day-column"><div class="day-header"></div>';
  for (let h = 8; h <= 18; h++) {
    const timeStr = String(h).padStart(2, '0') + ':00';
    html += `<div class="time-slot"><div class="time-label">${timeStr}</div></div>`;
  }
  html += '</div>';

  // Get all reservations for this week (expanding recurring events)
  const dateRange = { start, end };
  const allReservations = await expandRecurringEvents(state.currentRoom, dateRange);

  // Day columns
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dateStr = dateToString(d);
    const isToday = dateStr === dateToString(new Date());

    html += `<div class="day-column" style="position: relative;">
      <div class="day-header" style="background:${isToday ? 'var(--h500)' : 'var(--n50)'}; color:${isToday ? 'white' : 'var(--tx)'}">
        <div class="day-name">${DAYS[d.getDay()]}</div>
        <div class="day-number">${d.getDate()}</div>
      </div>`;

    // Time slots
    for (let h = 8; h <= 18; h++) {
      html += '<div class="time-slot"></div>';
    }

    // Get reservations for this day
    const reservations = allReservations.filter(r => r.date === dateStr);

    reservations.forEach(r => {
      const [startH, startM] = r.start_time.split(':').map(Number);
      const [endH, endM] = r.end_time.split(':').map(Number);
      const startMinutes = startH * 60 + startM - 8 * 60;
      const durationMinutes = (endH * 60 + endM) - (startH * 60 + startM);

      html += `<div class="event-block reserved" style="top:${startMinutes}px; height:${durationMinutes}px;" onclick="showEventModal({id:'${r.id}',name:'${r.name}',startTime:'${r.start_time}',endTime:'${r.end_time}',requester:'${r.requester}',notes:'${(r.notes || '').replace(/'/g, "\\'")}',recurrence_parent_id:'${r.recurrence_parent_id || ''}'},'${dateStr}')">
        <div class="event-name">${r.name}</div>
        <div class="event-time">${r.start_time} - ${r.end_time}</div>
        <div class="event-requester">${r.requester || 'N/A'}</div>
      </div>`;
    });

    html += '</div>';
  }

  html += '</div>';
  document.getElementById('calendar-view').innerHTML = html;
}

async function renderDay() {
  const dateStr = dateToString(state.currentDate);
  const dateRange = { start: state.currentDate, end: state.currentDate };
  const allReservations = await expandRecurringEvents(state.currentRoom, dateRange);
  const reservations = allReservations.filter(r => r.date === dateStr);

  let html = '<div style="display: flex; height: 100%; overflow: hidden;">';

  // Time column
  html += '<div style="width: 70px; background: var(--n50); border-right: 1px solid var(--bd); overflow-y: auto;">';
  for (let h = 8; h <= 18; h++) {
    const timeStr = String(h).padStart(2, '0') + ':00';
    html += `<div style="height: 60px; padding: 4px; text-align: right; font-size: 11px; color: var(--tx3); border-bottom: 1px solid var(--bd); font-weight: 600;">
      ${timeStr}
    </div>`;
  }
  html += '</div>';

  // Day content
  html += '<div style="flex: 1; position: relative; background: var(--surf); overflow-y: auto;">';

  reservations.forEach(r => {
    const [startH, startM] = r.start_time.split(':').map(Number);
    const [endH, endM] = r.end_time.split(':').map(Number);
    const top = (startH - 8) * 60 + startM;
    const height = (endH * 60 + endM) - (startH * 60 + startM);

    html += `<div class="event-block reserved" style="top: ${top}px; left: 8px; right: 8px; height: ${height}px;" onclick="showEventModal({id:'${r.id}',name:'${r.name}',startTime:'${r.start_time}',endTime:'${r.end_time}',requester:'${r.requester}',notes:'${(r.notes || '').replace(/'/g, "\\'")}',recurrence_parent_id:'${r.recurrence_parent_id || ''}'},'${dateStr}')">
      <div class="event-name">${r.name}</div>
      <div class="event-time">${r.start_time} - ${r.end_time}</div>
      <div class="event-requester">${r.requester || 'N/A'}</div>
    </div>`;
  });

  html += '</div></div>';
  document.getElementById('calendar-view').innerHTML = html;
}

async function renderMonth() {
  const year = state.currentDate.getFullYear();
  const month = state.currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - firstDay.getDay());

  let html = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--bd); padding: 0; height: 100%; overflow-y: auto;">';

  // Day headers
  DAYS.forEach(day => {
    html += `<div style="background: var(--n50); padding: 10px; text-align: center; font-weight: 600; font-size: 11px; color: var(--tx2); border-bottom: 1px solid var(--bd);">${day}</div>`;
  });

  // Get all reservations (expanding recurring events)
  const dateRange = { start: startDate, end: lastDay };
  const allReservations = await expandRecurringEvents(state.currentRoom, dateRange);

  // Days
  const today = dateToString(new Date());
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = dateToString(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = dateStr === today;
    const reservations = allReservations.filter(r => r.date === dateStr);

    html += `<div style="background: ${isToday ? 'var(--h500)' : 'var(--surf)'}; padding: 8px; min-height: 80px; color: ${isToday ? 'white' : 'var(--tx)'}; opacity: ${isOtherMonth ? '0.5' : '1'}; border-right: 1px solid var(--bd); border-bottom: 1px solid var(--bd); overflow: hidden;">
      <div style="font-weight: 600; margin-bottom: 4px;">${d.getDate()}</div>
      <div style="font-size: 10px;">
        ${reservations.slice(0, 2).map(r => `<div style="background: var(--r600); color: white; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;" onclick="showEventModal({id:'${r.id}',name:'${r.name}',startTime:'${r.start_time}',endTime:'${r.end_time}',requester:'${r.requester}',notes:'${(r.notes || '').replace(/'/g, "\\'")}',recurrence_parent_id:'${r.recurrence_parent_id || ''}'},'${dateStr}')">${r.start_time} ${r.name}</div>`).join('')}
        ${reservations.length > 2 ? `<div style="font-size: 9px; color: var(--tx2);">+${reservations.length - 2}</div>` : ''}
      </div>
    </div>`;
  }

  html += '</div>';
  document.getElementById('calendar-view').innerHTML = html;
}

function setView(v) {
  state.view = v;
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderCalendar().catch(err => console.error('Error rendering:', err));
}

async function renderCalendar() {
  updateLabel();
  if (state.view === 'month') await renderMonth();
  else if (state.view === 'week') await renderWeek();
  else if (state.view === 'day') await renderDay();
}

function updateLabel() {
  const label = document.getElementById('date-label');
  const d = state.currentDate;
  if (state.view === 'month') {
    label.textContent = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  } else if (state.view === 'week') {
    const start = new Date(d);
    start.setDate(start.getDate() - start.getDay());
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    label.textContent = `${start.getDate()} - ${end.getDate()} ${MONTHS[start.getMonth()]}`;
  } else {
    label.textContent = `${d.getDate()} de ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }
}

function navPrev() {
  if (state.view === 'month') state.currentDate.setMonth(state.currentDate.getMonth() - 1);
  else if (state.view === 'week') state.currentDate.setDate(state.currentDate.getDate() - 7);
  else state.currentDate.setDate(state.currentDate.getDate() - 1);
  renderCalendar().catch(err => console.error('Error rendering:', err));
}

function navNext() {
  if (state.view === 'month') state.currentDate.setMonth(state.currentDate.getMonth() + 1);
  else if (state.view === 'week') state.currentDate.setDate(state.currentDate.getDate() + 7);
  else state.currentDate.setDate(state.currentDate.getDate() + 1);
  renderCalendar().catch(err => console.error('Error rendering:', err));
}

function goToday() {
  state.currentDate = new Date();

}

function changeRoom() {

  // Parsear la fecha correctamente sin problemas de zona horaria
  const [year, month, day] = dateStr.split('-').map(Number);
  const d = new Date(year, month - 1, day);
  const dateFormatted = `${d.getDate()} de ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('modal-event-date').textContent = dateFormatted;

  document.getElementById('modal-event-requester').textContent = event.requester || 'N/A';

  if (event.notes) {

    document.getElementById('modal-details-group').style.display = 'none';

function closeEventModal() {

}

async function updateReservation(reservationId, data) {
  try {
    const { error } = await window.supabaseClient
      .from('reservations')
      .update(data)
      .eq('id', reservationId);

    if (error) {
      console.error('Error updating reservation:', error);
      return false;
    }

    cachedReservations = {};
    return true;
  } catch (e) {
    console.error('Error:', e);
    return false;
  }
}

function editEventReservation() {
  if (!state.currentEventInModal) return;

  const ev = state.currentEventInModal;
  // Para eventos recurrentes editamos la serie completa (el padre)
  state.editingReservationId = ev.recurrence_parent_id || ev.id;

  document.getElementById('booking-date').value = ev.date;
  document.getElementById('booking-start').value = ev.startTime;
  document.getElementById('booking-end').value = ev.endTime;
  document.getElementById('booking-name').value = ev.name;
  document.getElementById('booking-requester').value = ev.requester || '';
  document.getElementById('booking-details').value = ev.notes || '';

  document.querySelector('.booking-panel h3').textContent = 'Editar Reserva';
  document.querySelector('#booking-form .btn-primary').textContent = 'Guardar cambios';
  document.querySelector('#booking-form .btn-secondary').textContent = 'Cancelar';

  closeEventModal();
  document.querySelector('.booking-panel').scrollTop = 0;
}

function cancelEdit() {
  state.editingReservationId = null;
  document.querySelector('.booking-panel h3').textContent = 'Nueva Reserva';
  document.querySelector('#booking-form .btn-primary').textContent = 'Reservar';
  document.querySelector('#booking-form .btn-secondary').textContent = 'Limpiar';
  document.getElementById('booking-form').reset();
  document.getElementById('recurrence-fields').style.display = 'none';
  document.getElementById('booking-date').value = dateToString(new Date());
}

async function deleteEventReservation() {
  if (!state.currentEventInModal) return;

  const event = state.currentEventInModal;
  const isRecurring = event.recurrence_parent_id;

  if (!isRecurring) {
    // Evento único - eliminación simple
    if (!confirm('¿Eliminar esta reserva?')) return;

    const success = await deleteReservation(event.id, state.currentRoom);
    if (success) {
      closeEventModal();
      await renderCalendar();
      alert('Reserva eliminada');
    } else {
      alert('Error al eliminar la reserva');
    }
  } else {
    // Evento recurrente - mostrar modal con opciones
    document.getElementById('modal-delete-recurrence').style.display = 'flex';
  }
}

function closeDeleteRecurrenceModal() {
  document.getElementById('modal-delete-recurrence').style.display = 'none';
}

async function deleteRecurrenceInstance() {
  if (!state.currentEventInModal) return;

  const event = state.currentEventInModal;
  const success = await addDeleteException(event.recurrence_parent_id, event.date);

  if (success) {
    closeDeleteRecurrenceModal();
    closeEventModal();
    cachedExceptions.loaded = false;
    await renderCalendar();

async function deleteRecurrenceSeries() {
  if (!state.currentEventInModal) return;

  if (!confirm('¿ELIMINAR TODA LA SERIE? Esta acción no se puede deshacer.')) return;

  const event = state.currentEventInModal;
  const success = await deleteReservation(event.recurrence_parent_id, state.currentRoom);

  if (success) {
    closeDeleteRecurrenceModal();
    closeEventModal();
    cachedExceptions.loaded = false;
    await renderCalendar();
    alert('Serie eliminada completamente');
  } else {
    alert('Error al eliminar la serie');
  }
}

async function submitBooking(event) {
  event.preventDefault();

  const date = document.getElementById('booking-date').value;
  const startTime = document.getElementById('booking-start').value;
  const endTime = document.getElementById('booking-end').value;
  const name = document.getElementById('booking-name').value.trim();
  const requester = document.getElementById('booking-requester').value.trim();
  const details = document.getElementById('booking-details').value.trim();

  if (!date || !startTime || !endTime || !name) {
    alert('Completa los campos obligatorios');
    return;
  }

  if (await hasConflict(state.currentRoom, date, startTime, endTime)) {
    alert('Conflicto de horario. Elige otro rango.');
    return;
  }

  const recurrence = document.getElementById('booking-recurrence').value;
  const recurrenceEnd = document.getElementById('booking-recurrence-end').value;
  const recurrenceEndDate = document.getElementById('booking-recurrence-end-date').value;

  // Parsear fecha sin problemas de zona horaria
  const [y, m, d] = date.split('-').map(Number);
  const dateObj = new Date(y, m - 1, d);

  if (state.editingReservationId) {
    // MODO EDICIÓN
    const updateData = {
      date,
      start_time: startTime,
      end_time: endTime,
      name,
      requester: requester || 'N/A',
      notes: details,
      recurrence_type: recurrence === 'none' ? null : recurrence,
      recurrence_end_date: recurrenceEnd === 'forever' ? null : recurrenceEndDate,
      recurrence_day_of_week: recurrence === 'weekly' ? dateObj.getDay() : null,
      recurrence_day_of_month: recurrence === 'monthly' ? dateObj.getDate() : null,
    };

    const success = await updateReservation(state.editingReservationId, updateData);
    if (success) {
      cancelEdit();
      await renderCalendar();
      alert('Reserva actualizada');
    } else {
      alert('Error al actualizar la reserva');
    }
    return;
  }

  // MODO CREACIÓN
  const success = await addReservation({
    id: generateId(),
    date,
    startTime,
    endTime,
    name,
    requester: requester || 'N/A',
    notes: details,
    roomId: state.currentRoom,
    recurrenceType: recurrence === 'none' ? null : recurrence,
    recurrenceEndDate: recurrenceEnd === 'forever' ? null : recurrenceEndDate,
    dayOfWeek: recurrence === 'weekly' ? dateObj.getDay() : null,
    dayOfMonth: recurrence === 'monthly' ? dateObj.getDate() : null
  });

  if (success) {
    event.target.reset();
    document.getElementById('booking-recurrence').value = 'none';
    document.getElementById('recurrence-fields').style.display = 'none';
    document.getElementById('booking-date').value = dateToString(new Date());
    await renderCalendar();
    alert('Reserva guardada');
  } else {
    alert('Error al guardar la reserva');
  }
}

// INIT
async function init() {
  // Inicializar Supabase
  if (!window.supabaseClient) {
    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  const params = getUrlParams();
  state.mode = params.mode;
  state.currentRoom = getRoomId(params.sala);
  console.log('MODE:', state.mode, 'ROOM:', state.currentRoom);

  const app = document.getElementById('app');
  const roomSelectorWrapper = document.getElementById('room-selector-wrapper');
  const bookingPanel = document.querySelector('.booking-panel');

  if (state.mode === 'admin') {
    app.classList.remove('user-view');
    roomSelectorWrapper.classList.remove('hidden');
    bookingPanel.style.display = 'flex';
    document.getElementById('room-select').value = state.currentRoom;
  } else {
    app.classList.add('user-view');
    roomSelectorWrapper.classList.add('hidden');
    bookingPanel.style.display = 'none';
  }

  const today = dateToString(new Date());
  if (document.getElementById('booking-date')) {
    document.getElementById('booking-date').value = today;
  }

  await initSampleData();
  document.getElementById('booking-date').value = dateToString(new Date());
  await renderCalendar();

  // Recargar cada 5 segundos para sincronizar con otros usuarios
  setInterval(async () => {
    cachedReservations = {};
    await renderCalendar().catch(err => console.error('Error rendering:', err));
  }, 5000);
}

document.addEventListener('DOMContentLoaded', () => init());
